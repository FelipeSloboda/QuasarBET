spring.application.name=QuasarBET

#API VERSION
server.servlet.context-path=/api/v1

#SWAGGER
springdoc.api-docs.path=/swagger
springdoc.swagger-ui.disable-swagger-default-url=true

#POSTGRE
spring.datasource.url=jdbc:postgresql://${PSTG_HOST}:${PSTG_PORT}/${PSTG_DATABASE}
spring.datasource.username=${PSTG_USER}
spring.datasource.password=${PSTG_PASSWORD}

#SMTP (EMAIL)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}

#URLS
app.frontend.base-url=${FRONTEND_BASE_URL}

#TOKENS
api.token.email-confirm.minutes=${TOKEN_EMAIL_CONFIRM_MINUTES}